<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iintoo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="block">
            <div class="left">
                <img src="./bg.jpg" alt="left picture">
                <div class="logo">
                <img src="./logo (1).svg" alt="logo">
                </div>
            </div>
             <div class="right">
                <h1 class="main-title">Get iintoo it today</h1>
                <p class="subtitle">There is no charge or obligation upon registration</p>
             <div class="socseti">
                <button class="btn btn-fb">
                    <img src="./facebook.svg" alt="login with facebook" class="first"> Register with Facebook
                </button>
                <button class="btn btn-in">
                    <img src="./linkedin.svg" alt="login with linkedin" class="second"> Register with LinkedIn
                </button>
              </div>
              <div class="divider">
                <span>or</span>
              </div>
              <div class="input-row">
                <div class="input-email">
                 <label>Email</label>
                 <input type="email"> 
                </div>
                <div class="input-phone">
                <label>Phone</label>
                <input type="number">
                </div>
              </div>
              <h2 class="main-title">What type of investor are you?</h2>
              <p class="smaller">Select the type of investor you are bellow.</p>
              <div class="radio-group">
                <input type="radio" id="individual" name="individual" value="individual">
                <label for="individual">Individual</label>
                <input type="radio" id="business" name="business" value="business">
                <label for="business">Business</label>
                <input type="radio" id="ira" name="ira" value="ira">
                <label for="ira">IRA</label>
                <input type="radio" id="trust" name="trust" value="trust">
                <label for="trust">Trust</label>
              </div>
            </div>
        </div>
    </div>
 </div>
</body>
</html>
